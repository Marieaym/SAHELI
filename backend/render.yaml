# Render deployment blueprint — push this repo to GitHub, then on
# render.com choose "New +" -> "Blueprint" and point it at this repo.
# Render auto-detects this file and provisions the service below.
services:
  - type: web
    name: saheli-backend
    runtime: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false   # set manually in Render dashboard — never commit real keys
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # set to your real Vercel URL once deployed, e.g. https://saheli.vercel.app
      - key: JWT_SECRET
        generateValue: true
